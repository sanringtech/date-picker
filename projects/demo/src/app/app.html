<main class="min-h-screen bg-background flex flex-col items-center justify-center gap-4 p-8">
  <button
    sanringBtn
    variant="outline"
    size="sm"
    type="button"
    data-testid="theme-toggle"
    (click)="toggleTheme()"
  >
    切換深/淺色
  </button>

  <div
    sanringCalendarGrid
    #grid="sanringCalendarGrid"
    tabindex="0"
    data-testid="calendar-grid"
    class="w-80 rounded-lg border border-border bg-surface p-4 shadow-sm outline-none focus:ring-2 focus:ring-primary"
  >
    <div class="mb-4 flex items-center justify-between">
      <button
        sanringBtn
        variant="ghost"
        size="icon"
        type="button"
        data-testid="calendar-prev-month"
        aria-label="上一月"
        (click)="grid.engine.prevMonth()"
      >
        <svg lucideChevronLeft [size]="18"></svg>
      </button>
      <span class="font-semibold text-foreground">
        {{ currentMonthLabel(grid.engine.monthGrids()[0]) }}
      </span>
      <button
        sanringBtn
        variant="ghost"
        size="icon"
        type="button"
        data-testid="calendar-next-month"
        aria-label="下一月"
        (click)="grid.engine.nextMonth()"
      >
        <svg lucideChevronRight [size]="18"></svg>
      </button>
    </div>

    <div class="mb-1 grid grid-cols-7 gap-1 text-center text-xs font-medium text-muted">
      @for (label of weekdayLabels; track label) {
        <span>{{ label }}</span>
      }
    </div>

    <div class="grid grid-cols-7 gap-1">
      @for (day of grid.engine.monthGrids()[0]; track day.date.getTime()) {
        <button
          type="button"
          [attr.data-testid]="'calendar-day-' + dayTestId(day.date)"
          class="aspect-square rounded text-sm transition-colors"
          [class.text-muted]="!day.isCurrentMonth"
          [class.text-foreground]="day.isCurrentMonth && !day.isSelected"
          [class.bg-primary]="day.isSelected"
          [class.text-primary-foreground]="day.isSelected"
          [class.ring-2]="day.isFocused"
          [class.ring-primary]="day.isFocused"
          [class.font-bold]="day.isToday && !day.isSelected"
          (click)="grid.engine.selectDate(day.date)"
        >
          {{ day.date.getDate() }}
        </button>
      }
    </div>

    <div class="mt-4 flex items-center justify-between text-sm">
      <span class="text-muted" data-testid="calendar-selected-value">
        @if (grid.engine.selectedDate(); as selected) {
          已選：{{ formatDate(selected) }}
        } @else {
          尚未選取
        }
      </span>
      <button
        sanringBtn
        variant="outline"
        size="sm"
        type="button"
        data-testid="calendar-clear-selection"
        (click)="grid.engine.clearSelection()"
      >
        清空
      </button>
    </div>
  </div>
</main>
